<!DOCTYPE html>
<html lang="es"> <head> <title>Convertir CSV a GlossML</title>
    <link rel="stylesheet" id="theme" href="../../css/light.css">
    <link rel="stylesheet" href="../../css/fonts.css">
</head>

<body class="dialogBody">
    <table class="fill_width">
        <tr>
            <td class="noWrap middle"><label for="csvFile">Archivo CSV</label></td>
            <td class="fill_width middle"><input id="csvFile" type="text" class="fill_width" readonly></td>
            <td class="middle"><button id="browseCsv">Examinar...</button></td>
        </tr>
        <tr>
            <td class="noWrap middle"><label for="glossmlFile">Archivo GlossML</label></td>
            <td class="fill_width middle"><input id="glossmlFile" type="text" class="fill_width" readonly></td>
            <td class="middle"><button id="browseGlossml">Examinar...</button></td>
        </tr>
    </table>
    <table class="fill_width">
        <tr>
            <td class="middle noWrap"><label for="sourceLanguage">Idioma Origen</label></td>
            <td class="middle"><select id="sourceLanguage" class="table_select"></select></td>
            <td class="middle noWrap"><label for="encodingSelect">Juego de caracteres</label></td>
            <td class="middle"><select id="encodingSelect" class="table_select">
                    <option value="utf8" selected>UTF-8</option> <option value="utf16le">UTF-16LE</option> <option value="utf16be">UTF-16BE</option> <option value="latin1">ISO-8859-1 (Latin1)</option>
                </select></td>
        </tr>
        <tr>
            <td class="middle noWrap"><label for="columnSeparator">Separador de Columnas</label></td>
            <td class="middle noWrap"><select id="columnSeparator" class="table_select">
                    <option value="," selected>,</option>
                    <option value=";">;</option>
                    <option value=":">:</option>
                    <option value="|">|</option>
                    <option value="TAB">TAB</option>
                </select></td>
            <td class="middle noWrap"><label for="customSeparator">Separador Personalizado</label></td>
            <td><input type="text" id="customSeparator" style="width: 60px;"></td>
        </tr>
        <tr>
            <td class="middle noWrap"><label for="textDelimiter">Delimitador de Texto</label></td>
            <td class="middle noWrap"><select id="textDelimiter" class="table_select">
                    <option value='"' selected>"</option>
                    <option value="'">'</option>
                    <option value="">None</option>
                </select></td>

            <td class="middle noWrap"><label for="customDelimiter">Delimitador Personalizado</label></td>
            <td><input type="text" id="customDelimiter" style="width: 60px;"></td>
        </tr>
        <tr>
            <td colspan="2" class="middle">
                <input type="checkbox" id="hasHeaderRow" checked>
                <label for="hasHeaderRow">La primera fila contiene los encabezados de columna</label>
            </td>
        </tr>
    </table>
    <div id="csvStatus" style="padding: 4px 8px;"></div>
    <div id="mappingScroll" style="max-height: 220px; overflow: auto;">
        <table class="stripes" id="mappingTable">
            <thead>
                <tr id="columnHeaderRow"></tr>
            </thead>
            <tbody>
                <tr id="typeRow"></tr>
                <tr id="langRow"></tr>
            </tbody>
            <tbody id="previewBody"></tbody>
        </table>
    </div>
    <div class="buttonArea">
        <input type="checkbox" id="openResult" checked>
        <label for="openResult">Abrir el glosario generado</label>
        <button id="importButton">Convertir CSV a GlossML</button>
    </div>
    <script>
        const { ImportCsv } = require('../../js/importCsv.js');
        new ImportCsv();
    </script>
</body>

</html>
