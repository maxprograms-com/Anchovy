<!DOCTYPE html>
<html lang="es"> <head> <title>A&ntilde;adir Columna</title>
    <link rel="stylesheet" id="theme" href="../../css/light.css">
    <link rel="stylesheet" href="../../css/fonts.css">
</head>

<body class="dialogBody">
    <table class="fill_width">
        <tr>
            <td>Tipo de Columna</td>
        </tr>
        <tr>
            <td>
                <input type="radio" id="comment" name="columnType" value="comment">
                <label for="comment">Columna de Comentario</label>
            </td>
        </tr>
        <tr>
            <td>
                <input type="radio" id="term" name="columnType" value="term" checked>
                <label for="term">Columna de T&eacute;rmino</label>
            </td>
        </tr>
        <tr>
            <td>
                <input type="radio" id="definition" name="columnType" value="definition">
                <label for="definition">Columna de Definici&oacute;n</label>
            </td>
        </tr>
    </table>
    <table class="fill_width">
        <tr>
            <td class="noWrap middle"><label for="colLanguage">Idioma</label></td>
            <td class="fill_width middle">
                <select id="colLanguage" class="table_select"></select>
            </td>
        </tr>
    </table>

    <div class="buttonArea">
        <button id="addColumn">A&ntilde;adir Columna</button>
    </div>
    <script>
        const { AddColumn } = require('../../js/addColumn.js');
        new AddColumn();
    </script>
</body>

</html>
