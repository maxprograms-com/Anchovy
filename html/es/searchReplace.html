<!DOCTYPE html>
<html lang="es"> <head> <title>Buscar y Reemplazar</title>
    <link rel="stylesheet" id="theme" href="../../css/light.css">
    <link rel="stylesheet" href="../../css/fonts.css">
</head>

<body class="dialogBody">
    <div>
        <table class="fill_width">
            <tr>
                <td class="middle noWrap"><label for="searchText">Texto a Buscar</label></td>
                <td class="middle fill_width">
                    <input type="text" id="searchText" class="table_input">
                </td>
            </tr>
            <tr>
                <td class="middle noWrap"><label for="replaceText">Reemplazar Con</label></td>
                <td class="middle fill_width">
                    <input type="text" id="replaceText" class="table_input">
                </td>
            </tr>
            <tr>
                <td colspan="2" class="middle">
                    <input type="checkbox" id="caseSensitive" class="middle">
                    <label for="caseSensitive" class="middle">Distinguir May&uacute;sculas y Min&uacute;sculas</label>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="middle">
                    <input type="checkbox" id="regularExpression" class="middle">
                    <label for="regularExpression" class="middle">Expresi&oacute;n Regular</label>
                </td>
            </tr>
        </table>
    </div>
    <div class="buttonArea">
        <button id="find">Buscar</button> <button id="findNext">Buscar Siguiente</button> <button id="replace" disabled>Reemplazar</button> <button id="replaceAll">Reemplazar Todo</button>
    </div>
    <script>
        const { searchReplace } = require('../../js/searchReplace.js');
        new searchReplace();
    </script>
</body>

</html>
