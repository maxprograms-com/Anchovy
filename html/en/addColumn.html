<!DOCTYPE html>
<html lang="en">

<head>
    <title>Add Column</title>
    <link rel="stylesheet" id="theme" href="../../css/light.css">
    <link rel="stylesheet" href="../../css/fonts.css">
</head>

<body class="dialogBody">
    <table class="fill_width">
        <tr>
            <td>Column Type</td>
        </tr>
        <tr>
            <td>
                <input type="radio" id="comment" name="columnType" value="comment">
                <label for="comment">Comment Column</label>
            </td>
        </tr>
        <tr>
            <td>
                <input type="radio" id="term" name="columnType" value="term" checked>
                <label for="term">Term Column</label>
            </td>
        </tr>
        <tr>
            <td>
                <input type="radio" id="definition" name="columnType" value="definition">
                <label for="definition">Definition Column</label>
            </td>
        </tr>
    </table>
    <table class="fill_width">
        <tr>
            <td class="noWrap middle"><label for="colLanguage">Language</label></td>
            <td class="fill_width middle">
                <select id="colLanguage" class="table_select"></select>
            </td>
        </tr>
    </table>

    <div class="buttonArea">
        <button id="addColumn">Add Column</button>
    </div>
    <script>
        const { AddColumn } = require('../../js/addColumn.js');
        new AddColumn();
    </script>
</body>

</html>
