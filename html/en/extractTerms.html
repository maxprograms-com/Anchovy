<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Term Extraction</title>
    <link rel="stylesheet" id="theme" href="../../css/light.css">
    <link rel="stylesheet" href="../../css/fonts.css">
</head>

<body class="dialogBody">
        <table class="fill_width">
            <tr>
                <td class="noWrap middle"><label for="sourceFile">Source File</label></td>
                <td class="fill_width middle"><input id="sourceFile" type="text" class="fill_width"></td>
                <td class="middle"><button id="browseSource">Browse...</button></td>
            </tr>
            <tr>
                <td class="noWrap middle"><label for="glossmlFile">GlossML File</label></td>
                <td class="fill_width middle"><input id="glossmlFile" type="text" class="fill_width"></td>
                <td class="middle"><button id="browseGlossml">Browse...</button></td>
            </tr>
            <tr>
                <td class="noWrap middle"><label for="sourceSelect">Source Language</label></td>
                <td class="fill_width" colspan="2"><select id="sourceSelect" class="table_select"></select>
                </td>
            </tr>
            <tr>
                <td class="noWrap middle"><label for="typeSelect">File Type</label></td>
                <td class="fill_width middle" colspan="2"><select id="typeSelect" class="table_select"></select></td>
            </tr>
            <tr>
                <td class="noWrap middle"><label for="charsetSelect">Character Set</label></td>
                <td class="fill_width middle" colspan="2"><select id="charsetSelect" class="table_select"></select>
                </td>
            </tr>
            <tr>
                <td class="noWrap middle"><label for="frequency">Minimum Frequency</label></td>
                <td class=" middle"><input id="frequency" type="number" class="fill_width" value="3" min="1"></td>
            </tr>
            <tr>
                <td class="noWrap middle"><label for="termLength">Maximum Term Length</label></td>
                <td class=" middle"><input id="termLength" type="number" class="fill_width" value="3" min="1"></td>
            </tr>
        </table>
    <div class="buttonArea">
        <span class="fill_width">&nbsp;</span>
        <button id="extractTermsButton">Extract Candidates</button>
    </div>
    <script>
        const { ExtractTerms } = require('../../js/extractTerms.js');
        new ExtractTerms();
    </script>
</body>

</html>
