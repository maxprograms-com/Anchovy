<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bilingual Term Candidates</title>
    <link rel="stylesheet" id="theme" href="../../css/light.css">
    <link rel="stylesheet" href="../../css/fonts.css">
</head>

<body class="dialogBody">

    <div id="container" class="divContainer" style="height: 500px;">
        <table id="candidatesTable" class="fill_width alternate">

        </table>
    </div>

    <div id="buttonArea" class="buttonArea">
        <input type="checkbox" id="openResult" checked>
        <label for="openResult" class="noWrap">Open generated glossary</label>
        <span class="fill_width">&nbsp;</span>
        <button id="removeSelected">Remove Selected</button>
        <button id="save">Save Glossary</button>
    </div>

    <script>
        const { BilingualCandidatesViewer } = require('../../js/bilingualCandidatesViewer.js');
        new BilingualCandidatesViewer();
    </script>
</body>

</html>
