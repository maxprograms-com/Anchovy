<!DOCTYPE html>
<html lang="en">

<head>
    <title>Search and Replace</title>
    <link rel="stylesheet" id="theme" href="../../css/light.css">
    <link rel="stylesheet" href="../../css/fonts.css">
</head>

<body class="dialogBody">
    <div>
        <table class="fill_width">
            <tr>
                <td class="middle noWrap"><label for="searchText">Text to Search</label></td>
                <td class="middle fill_width">
                    <input type="text" id="searchText" class="table_input">
                </td>
            </tr>
            <tr>
                <td class="middle noWrap"><label for="replaceText">Replace With</label></td>
                <td class="middle fill_width">
                    <input type="text" id="replaceText" class="table_input">
                </td>
            </tr>
            <tr>
                <td colspan="2" class="middle">
                    <input type="checkbox" id="caseSensitive" class="middle">
                    <label for="caseSensitive" class="middle">Case Sensitive</label>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="middle">
                    <input type="checkbox" id="regularExpression" class="middle">
                    <label for="regularExpression" class="middle">Regular Expression</label>
                </td>
            </tr>
        </table>
    </div>
    <div class="buttonArea">
        <button id="find">Find</button>
        <button id="findNext">Find Next</button>
        <button id="replace" disabled>Replace</button>
        <button id="replaceAll">Replace All</button>
    </div>
    <script>
        const { searchReplace } = require('../../js/searchReplace.js');
        new searchReplace();
    </script>
</body>

</html>
