<!DOCTYPE html>
<html lang="en">

<head>
    <title>Glossary Information</title>
    <link id="theme" rel="stylesheet" type="text/css" href="../../css/light.css">
    <link rel="stylesheet" type="text/css" href="../../css/fonts.css">
</head>

<body class="dialogBody">
    <div class="paddedArea">
        <table class="fill_width">
            <tr>
                <td class="noWrap middle">Source Language</td>
                <td class="fill_width middle">
                    <select id="srcLang" class="table_select"></select>
                </td>
            </tr>
            <tr>
                <td class="noWrap middle">Languages</td>
                <td id="languages" class="middle">&nbsp;</td>
            </tr>
            <tr>
                <td class="noWrap middle">Number of Terms</td>
                <td id="numTerms" class="noWrap middle">&nbsp;</td>
            </tr>
        </table>

        <label for="glossaryComment">Glossary Comment</label>
        <textarea id="glossaryComment" rows="6"></textarea>
    </div>

    <div class="buttonArea">
        <button id="save">Save</button>
    </div>
    <script>
        const { GlossaryInfo } = require('../../js/glossaryInfo.js');
        new GlossaryInfo();
    </script>
</body>

</html>
